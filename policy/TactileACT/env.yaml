name: TactileACT
 
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
 
dependencies:
  - python=3.11
  - pip
 
  # PyTorch with CUDA 12.4 (via conda for proper CUDA integration)
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.4
 
  - pip:
    - pyyaml
    - pexpect
    - opencv-python
    - matplotlib
    - einops
    - packaging
    - h5py
    - ipython
    - tqdm
 